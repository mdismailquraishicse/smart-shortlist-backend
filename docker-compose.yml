version: "3.9"

services:
  backend:
    build: .

    container_name: smart-shortlisting-backend

    ports:
      - "8000:8000"

    volumes:
      - ./uploads:/app/uploads
      - ./qdrant_storage:/app/qdrant_storage


    env_file:
      - .env

    environment:
      - HOST=qdrant
      - QDRANT_PORT=6333

    depends_on:
      - qdrant

    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest

    container_name: smart-shortlisting-qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ./qdrant_storage:/qdrant/storage

    restart: unless-stopped